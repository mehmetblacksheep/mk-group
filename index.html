<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Belek ve Antalya bolgesinde tur, transfer ve market hizmetlerini hizlica inceleyin, fiyatlari gorun ve WhatsApp uzerinden iletisime gecin."
  />
  <meta name="theme-color" content="#f5efe6" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MK Tur Tourism" />
  <meta property="og:title" content="MK Tur Tourism" />
  <meta
    property="og:description"
    content="Belek ve Antalya bolgesinde tur, transfer ve market hizmetlerini hizlica inceleyin."
  />
  <meta property="og:url" content="https://www.belekmkgroup.com/" />
  <meta property="og:image" content="https://www.belekmkgroup.com/assets/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://www.belekmkgroup.com/" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>MK Tur Tourism</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <img src="assets/logo.png" alt="MK Tur Tourism logo" class="logo" />
        <div>
          <h1>MK Tur Tourism</h1>
          <p class="subtitle" id="screenSubtitle">Hizmet seçin</p>
        </div>
      </div>
      <div class="language-switcher" id="languageSwitcher">
        <button
          class="language-toggle"
          id="languageToggle"
          type="button"
          aria-haspopup="listbox"
          aria-expanded="false"
          aria-label="Dil seçimi"
        >
          <img class="language-flag" id="languageFlag" src="assets/flag-tr.svg" alt="" />
          <span class="language-current">
            <span class="language-label" id="languageLabel">Türkçe</span>
            <span class="language-code" id="languageCode">TR</span>
          </span>
          <span class="language-arrow" aria-hidden="true">▾</span>
        </button>
        <div class="language-menu hidden" id="languageMenu" role="listbox" aria-label="Dil seçimi">
          <button class="language-option" type="button" role="option" aria-selected="true" data-lang="tr">
            <img class="language-flag" src="assets/flag-tr.svg" alt="" />
            <span>Türkçe</span>
            <span class="language-option-code">TR</span>
          </button>
          <button class="language-option" type="button" role="option" aria-selected="false" data-lang="en">
            <img class="language-flag" src="assets/flag-en.svg" alt="" />
            <span>English</span>
            <span class="language-option-code">EN</span>
          </button>
          <button class="language-option" type="button" role="option" aria-selected="false" data-lang="de">
            <img class="language-flag" src="assets/flag-de.svg" alt="" />
            <span>Deutsch</span>
            <span class="language-option-code">DE</span>
          </button>
          <button class="language-option" type="button" role="option" aria-selected="false" data-lang="ru">
            <img class="language-flag" src="assets/flag-ru.svg" alt="" />
            <span>Русский</span>
            <span class="language-option-code">RU</span>
          </button>
          <button class="language-option" type="button" role="option" aria-selected="false" data-lang="ar">
            <img class="language-flag" src="assets/flag-ar.svg" alt="" />
            <span>العربية</span>
            <span class="language-option-code">AR</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="category-grid" id="categoryGrid">
        <button class="category-card" data-category="tour" type="button">
          <div class="category-image tour-bg"></div>
          <div class="category-content">
            <h2 id="labelTour">Tur</h2>
            <p id="descTour">Tekne turları, safari ve aktiviteler</p>
          </div>
        </button>

        <button class="category-card" data-category="transfer" type="button">
          <div class="category-image transfer-bg"></div>
          <div class="category-content">
            <h2 id="labelTransfer">Transfer</h2>
            <p id="descTransfer">VIP transfer, havaalanı ve araç seçenekleri</p>
          </div>
        </button>

        <button class="category-card" data-category="market" type="button">
          <div class="category-image market-bg"></div>
          <div class="category-content">
            <h2 id="labelMarket">Market</h2>
            <p id="descMarket">İçecekler, atıştırmalıklar ve ihtiyaç ürünleri</p>
          </div>
        </button>
      </section>

      <section class="list-section hidden" id="listSection">
        <div class="list-header">
          <div>
            <h2 id="activeCategoryTitle">Tur</h2>
            <p id="activeCategoryDescription">Aşağıdan seçim yapın</p>
          </div>
          <button id="backToCategories" class="secondary-btn" type="button">Geri</button>
        </div>

        <div id="itemList" class="item-list"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Mehmet Karakoyun. Tüm hakları saklıdır.</p>
    </footer>
  </div>

  <a
  class="whatsapp-float"
  id="whatsappFloat"
  data-whatsapp-link
  href="https://wa.me/905349172414"
  target="_blank"
  rel="noopener noreferrer"
>WhatsApp</a>

  <div class="modal-overlay hidden" id="detailModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="closeModal" aria-label="Kapat" type="button">×</button>
      <div class="modal-layout">
        <div class="modal-media-wrap">
          <img id="modalImage" class="modal-image" alt="Detay görseli" />
          <button class="gallery-nav prev" id="galleryPrev" aria-label="Önceki görsel" type="button">‹</button>
          <button class="gallery-nav next" id="galleryNext" aria-label="Sonraki görsel" type="button">›</button>
          <div class="gallery-dots" id="galleryDots"></div>
        </div>

        <div class="lightbox hidden" id="lightbox">
          <button class="lightbox-close" id="closeLightbox" aria-label="Kapat" type="button">×</button>
          <img id="lightboxImage" class="lightbox-image" alt="Büyük görsel" />
        </div>

        <div class="modal-content">
          <h3 id="modalTitle"></h3>
          <p id="modalDescription" class="modal-description"></p>
          <div id="modalMarketList" class="market-detail-list hidden"></div>
          <div id="modalMeta" class="meta-list"></div>
          <div class="price-row">
            <span id="modalPrice" class="price-badge"></span>
          </div>

          <a
  id="modalWhatsapp"
  class="primary-btn"
  data-whatsapp-link
  href="https://wa.me/905349172414"
  target="_blank"
  rel="noopener noreferrer"
>WhatsApp ile iletişime geç</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
